<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css multicolor website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2&family=Comic+Relief:wght@400;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        :root {
            --primary-color: rgb(255, 142, 161);
            --text-color: white;
            --secondary-color: pink;
        }

        /* :root {
            --primary-color: rgb(27, 116, 250);
            --text-color: white;
            --secondary-color: rgb(102, 160, 246);
        } */

        body {
            background-color: var(--secondary-color);

        }

        * {
            margin: 0;
            padding: 0;
            font-family: "Baloo 2", sans-serif;
        }

        ul li {
            list-style: none;
            display: inline;
            padding: 23px;
            font-weight: 600;
            color: var(--text-color);
        }

        ul li a {
            color: var(--text-color);
            text-decoration: none;
        }

        nav {
            background-color: var(--primary-color);
            padding: 12px 0px;
        }
    </style>
</head>

<body>
    <!-- Create a multicolor website which can change color using CSS Variables -->
    <header>
        <nav>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href=""></a>About</a></li>
                <li><a href=""></a>Services</a></li>
                <li><a href=""></a>Contact us</a></li>
            </ul>
        </nav>
    </header>
</body>

</html>
