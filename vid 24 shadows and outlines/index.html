<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 34px;
            box-shadow: 0px 20px 20px 14px rgb(94, 54, 90);
            /* perform shadows in page inspect */
        }

        .text {
            text-shadow: -1px 18px 4px rgb(33, 3, 3);
        }
        .out{
            outline: 2px solid black;
            border: 2px solid green;
            border-radius: 22px;
            outline-offset: 11px;
        }
    </style>
</head>

<body>
    <div class="box">i am a box</div>
    <br><br>
    <p class="out">hi this is deep</p>
    <br><br>
    <p class="text">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Odit sit iste sint </p>
</body>

</html>
