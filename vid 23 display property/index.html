<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid blue;
            display: inline;
        }

        .boy {
            border: 2px solid blue;
            /* display: inline; */
            display: inline-block;
            padding: 45px;
            margin: 45px;
        }
    </style>
</head>

<body>
    <div class="box">
        i am a box
    </div>
    <div class="box">
        i am another box
    </div>
    <span>i am a boy</span>
    <span>i am another boy</span>
    <div class="boy">i am a girl</div>
</body>

</html>
