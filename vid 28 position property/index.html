<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid black;
            height: 400px;
            width: 80vw;
            margin: 3px;
            padding: 3px;
        }

        .box1 {
            background-color: red;
            position: absolute;
            top: 0px;
            left: 0px;
            /* position: sticky;
            top: 0px;
            margin: 0;
            padding: 0;
            height: 100px;
            width: 100%; */
        }

        .box2 {
            background-color: aqua;
            /* position: relative;
            top: 30px;
            left: 54px; */
        }

        .box3 {
            background-color: skyblue;
            /* position: fixed;
            bottom: 0px;
            left: 8vw;
            height: 100px; */
        }

        .box4 {
            background-color: green;
        }


        .parent {
            border: 3px solid blue;
            margin: 34px;
            padding: 43px;
            position: absolute;
            /* transform, filter or perspective can also make an element appear as positioned */
            /* position: relative; */
            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
