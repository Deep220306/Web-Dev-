<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            padding: 0;
            margin: 0;
        }

        body {
            background-color: grey;
            display: flex;
        }

        .card {
            background: white;
            width: 322px;
            height: 433px;
            border-radius: 7px;
            margin-top: 4px;
        }

        .image {
            padding: 21px;
        }

        .image img {
            border-radius: 7px;
        }

        .content {
            padding: 9px 13px;
            font-family: "Baloo 2", sans-serif;

        }

        .content p {
            font-size: medium;
            color: grey;
        }

        .capsules {
            padding: 0px 90px;
        }

        .capsules span {
            border: 2px solid grey;
            padding: 5px;
            border-radius: 15px;
            padding: 0px 8px;
        }
        .button{
            text-align: center;
        }
        .button button{
            border-radius: 7px;
            padding: 4px 7px;
            background-color: rgb(216, 236, 253);
            color: rgb(14, 150, 234);
            font-size: 10px;
            border: none;
            font-weight: bold;
        }
                .button button:hover{
            background-color: rgb(194, 225, 246);
            color: rgb(10, 136, 214);
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img width="280px" height="170px"
                src="https://thumbs.dreamstime.com/b/imagie-man-boat-fishing-sunset-man-boat-fishing-sunset-338246714.jpg"
                alt="">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Thought</h2>
            <p>Today is a good day so be in the nature and dwell with it till the end of the sea as u will cherrish
                these days the most.</p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
    <div class="card">
        <div class="image">
            <img width="280px" height="170px"
                src="https://thumbs.dreamstime.com/b/imagie-man-boat-fishing-sunset-man-boat-fishing-sunset-338246714.jpg"
                alt="">
        </div>
        <div class="capsules">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h2>Thought</h2>
            <p>Today is a good day so be in the nature and dwell with it till the end of the sea as u will cherrish
                these days the most.</p>
        </div>
        <div class="button">
            <button>Read More</button>
        </div>
    </div>
</body>

</html>
